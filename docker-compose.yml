version: "3.9"

services:
  db:
    image: postgres:16
    container_name: code_odyssey_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: code_odyssey
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  server:
    build: ./server
    container_name: code_odyssey_server
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/code_odyssey
      JWT_SECRET: code_odyssey_secret_key
      PORT: 3000
    depends_on:
      - db
    volumes:
      - ./server:/app
      - /app/node_modules

volumes:
  db_data: